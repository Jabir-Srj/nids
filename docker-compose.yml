version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DEBUG=False
      - API_HOST=0.0.0.0
      - API_PORT=5000
    volumes:
      - ./backend:/app
    networks:
      - nids-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - nids-network
    environment:
      - REACT_APP_API_URL=http://backend:5000

networks:
  nids-network:
    driver: bridge
